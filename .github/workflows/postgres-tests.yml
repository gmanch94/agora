name: postgres-tests

# Real-Postgres Alembic + ORM-parity test (backlog #4). Runs the
# integration-marked tests in tests/test_alembic_postgres.py against
# a postgres:15-alpine service container. Other test categories
# (the SQLite-backed unit/property/e2e suite) are not in scope here
# -- triple-gate-in-CI is tracked separately.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  alembic-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run alembic + ORM parity tests
        env:
          # Service container is reachable at localhost:5432 inside
          # the runner. asyncpg URL drives the async engine; alembic
          # honors the injected sqlalchemy.url.
          AGORA_TEST_DB_URL: postgresql+asyncpg://agora:agora@localhost:5432/agora_test
        run: |
          pytest tests/test_alembic_postgres.py -v

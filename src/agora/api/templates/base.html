<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Agora{% endblock %}</title>
  <link rel="stylesheet" href="/static/theme.css" />
  <script src="/static/htmx.min.js" defer></script>
</head>
<body hx-boost="true">
  <header class="header">
    <span class="header__brand">Agora</span>
    <span class="header__sub">Staff console &mdash; ILL prototype</span>
    <nav class="header__nav">
      <a href="/" class="header__nav-link">Inbox</a>
      <a href="/browser" class="header__nav-link">Browser</a>
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <div class="sunset-stripe" aria-hidden="true"></div>
  <footer class="footer">
    Agora research prototype &middot; FedRAMP alignment-noted only
  </footer>
</body>
</html>
